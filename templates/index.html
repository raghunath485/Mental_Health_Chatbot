<!DOCTYPE html>
<html>

<head>

    <title>Mental Wellness Buddy</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            overflow: hidden;
            transition: 0.3s;
        }

        .dark-mode {
            background: #121212;
        }

        #chat-wrapper {
            width: min(750px, 92vw);
            height: 680px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s ease;
        }

        .dark-mode #chat-wrapper {
            background: rgba(0, 0, 0, 0.6);
            color: white;
        }

        #chat-header {
            background: linear-gradient(135deg, #5865f2, #8fa2ff);
            padding: 18px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #header-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #avatar-wrapper {
            position: relative;
            width: 50px;
            height: 50px;
        }

        #coach-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
        }

        #status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #46f58f;
            border-radius: 50%;
            border: 2px solid white;
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }

            100% {
                transform: scale(1)
            }
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .bubble {
            max-width: 70%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 18px;
            font-size: 14px;
        }

        .user-bubble {
            background: linear-gradient(135deg, #5865f2, #7c8cff);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .bot-bubble {
            background: #eef1ff;
            color: #222;
            margin-right: auto;
            border-bottom-left-radius: 5px;
            white-space: pre-line;
        }

        .dark-mode .bot-bubble {
            background: #2b2b2b;
            color: white;
        }

        .emergency-bubble {
            background: #ffebee;
            border: 2px solid #ff4d4d;
            color: #7a0000;
            font-weight: 600;
            white-space: pre-line;
        }

        .timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        #typing {
            font-size: 13px;
            padding-left: 20px;
            display: none;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 0.3
            }

            50% {
                opacity: 1
            }

            100% {
                opacity: 0.3
            }
        }

        #chat-input-area {
            display: flex;
            padding: 15px;
            background: white;
            gap: 10px;
        }

        .dark-mode #chat-input-area {
            background: #1f1f1f;
        }

        #userInput {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        #sendBtn {
            background: #5865f2;
            color: white;
        }
    </style>

</head>

<body>

    <div id="chat-wrapper">

        <div id="chat-header">

            <div id="header-row">

                <div id="avatar-wrapper">
                    <img id="coach-avatar" src="/static/coach.png">
                    <div id="status-dot"></div>
                </div>

                <div>
                    <h2 style="margin:0">Mental Wellness Buddy</h2>
                    <p style="margin:0;font-size:12px">Your supportive AI coach</p>
                </div>

            </div>

            <div class="header-buttons">

                <button onclick="toggleDark()" class="btn btn-light btn-sm">🌙</button>

                <a href="/dashboard" class="btn btn-success btn-sm">
                    📊 Dashboard
                </a>

                <a href="/logout" class="btn btn-danger btn-sm">
                    Logout
                </a>

            </div>

        </div>

        <div id="chat-messages"></div>

        <div id="typing">🤖 Buddy is typing...</div>

        <div id="chat-input-area">

            <input id="userInput" placeholder="Type how you feel...">

            <button id="sendBtn" onclick="sendMessage()">Send</button>

        </div>

    </div>

    <script>

        function formatTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function getEmoji(emotion) {

            const emojis = {
                joy: "😊",
                sadness: "😔",
                anger: "😡",
                fear: "😟",
                neutral: "😐"
            };

            return emojis[emotion] || "💬";

        }

        async function sendMessage() {

            const input = document.getElementById("userInput");
            const text = input.value.trim();

            if (!text) return;

            const chat = document.getElementById("chat-messages");

            chat.innerHTML += `
<div class="bubble user-bubble">
${text}
<div class="timestamp">${formatTime()}</div>
</div>
`;

            chat.scrollTop = chat.scrollHeight;

            input.value = "";

            document.getElementById("typing").style.display = "block";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();

            document.getElementById("typing").style.display = "none";

            let bubbleClass = "bubble bot-bubble";

            if (data.reply.includes("Helpline")) {
                bubbleClass = "bubble emergency-bubble";
            }

            chat.innerHTML += `
<div class="${bubbleClass}">
${getEmoji(data.emotion)} ${data.reply}
<div class="timestamp">${formatTime()}</div>
</div>
`;

            chat.scrollTo({
                top: chat.scrollHeight,
                behavior: "smooth"
            });

        }

        document.getElementById("userInput")
            .addEventListener("keypress", function (e) {
                if (e.key === "Enter") sendMessage();
            });

        function toggleDark() {
            document.body.classList.toggle("dark-mode");
        }

        const card = document.getElementById("chat-wrapper");

        document.addEventListener("mousemove", e => {

            const rect = card.getBoundingClientRect();

            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            const dx = (e.clientX - cx) / rect.width;
            const dy = (e.clientY - cy) / rect.height;

            card.style.transform = `rotateX(${-dy * 8}deg) rotateY(${dx * 8}deg)`;

        });

        document.addEventListener("mouseleave", () => {
            card.style.transform = "rotateX(0) rotateY(0)";
        });

    </script>

</body>

</html>
