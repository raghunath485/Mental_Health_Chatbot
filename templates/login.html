<!DOCTYPE html>
<html>

<head>

    <title>Mental Wellness Buddy - Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
        }

        .card {
            width: 360px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
        }

        .error {
            background: #ff4d4d;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #5865f2;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #4752d4;
        }

        .link {
            margin-top: 15px;
            font-size: 13px;
        }

        .link a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="logo">🧠 Mental Wellness Buddy</div>

        <h2>Login</h2>

        <!-- ERROR MESSAGE -->
        {% if error %}
        <div class="error">
            ❌ {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <div class="link">
            Don't have an account? <a href="/signup">Create account</a>
        </div>

    </div>

</body>

</html>
